name: Tests - Frontend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/tests.yml"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
      - ".github/workflows/tests.yml"

permissions:
  contents: read

concurrency:
  group: frontend-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Ejecutar pruebas unitarias
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias bloqueadas
        run: npm ci

      - name: Ejecutar pruebas
        run: npm run test

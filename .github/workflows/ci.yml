name: CI - Frontend

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    name: Validar y construir Vite
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias bloqueadas
        run: npm ci

      - name: Auditar dependencias de producción
        run: npm audit --omit=dev --audit-level=high

      - name: Ejecutar linter
        run: npm run lint

      - name: Compilar TypeScript y Vite
        run: npm run build

      - name: Verificar la vista previa de producción
        shell: bash
        run: |
          ./node_modules/.bin/vite preview --host 127.0.0.1 --port 4173 > vite-preview.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT

          for attempt in {1..20}; do
            echo "Esperando a Vite (intento $attempt/20)"
            if curl --fail --silent --show-error http://127.0.0.1:4173/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done

          cat vite-preview.log
          exit 1

      - name: Guardar registro de vista previa si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-runtime-log
          path: vite-preview.log
          if-no-files-found: ignore
          retention-days: 7

      - name: Guardar artefacto de producción
        uses: actions/upload-artifact@v4
        with:
          name: frontend-vite-dist
          path: dist/
          if-no-files-found: error
          retention-days: 7
